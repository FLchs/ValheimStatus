name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ['**']

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run paraglide
      - run: bun run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  screenshot:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - name: Install Playwright
        run: bunx playwright install chromium
      - name: Start server and take screenshot
        run: |
          bunx serve dist -l 3000 &
          sleep 5
          bunx playwright screenshot --viewport-size=800,1400 --wait-for-timeout=3000 "http://localhost:3000/#/demo" screenshot.png
          pkill -f "serve" || true
      - uses: actions/upload-artifact@v4
        with:
          name: demo-screenshot
          path: screenshot.png
